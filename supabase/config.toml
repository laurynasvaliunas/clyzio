# Supabase local-dev config. Committed so `supabase start` works for every
# contributor without copy/paste setup.
#
# Edit carefully — this file also affects the generated OpenAPI schema and
# must stay in sync with production schemas declared in `supabase/migrations`.

project_id = "clyzio"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

[auth]
enabled = true
site_url = "clyzio://"
additional_redirect_urls = ["clyzio://", "clyzio://reset-password", "https://clyzio.app"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[storage]
enabled = true
file_size_limit = "50MiB"

[edge_runtime]
enabled = true
policy = "oneshot"

[analytics]
enabled = false

[functions.daily-commute-matcher]
verify_jwt = false

[functions.delete-account]
verify_jwt = true

[functions.submit-trip-intent]
verify_jwt = true

[functions.driver-respond-to-matches]
verify_jwt = true

[functions.passenger-respond-to-match]
verify_jwt = true

[functions.ai-commute-planner]
verify_jwt = true

[functions.ai-carpool-matcher]
verify_jwt = true

[functions.ai-sustainability-report]
verify_jwt = true
